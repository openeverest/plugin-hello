replicaCount: 1

image:
  repository: ghcr.io/openeverest/plugin-hello
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  port: 3001

plugin:
  # The name used for the Plugin CR (defaults to the release name).
  displayName: "Hello Plugin"
  description: "A sample plugin that demonstrates the OpenEverest plugin system."
  vendor: "OpenEverest"
  enabled: true
  bundlePath: "/main.js"
  extensionPoints:
    - type: route
      path: /hello
      label: Hello
    - type: sidebarItem
      path: /hello
      label: Hello
      icon: waving_hand

resources:
  limits:
    cpu: 100m
    memory: 64Mi
  requests:
    cpu: 50m
    memory: 32Mi
